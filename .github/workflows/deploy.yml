name: deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}        # cicd UAMI client id (from azd provision output)
  AZURE_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP:  ${{ vars.AZURE_RESOURCE_GROUP }}
  ACR_NAME:              ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER:      ${{ vars.ACR_LOGIN_SERVER }}
  API_APP_NAME:          ${{ vars.API_APP_NAME }}
  WEB_APP_NAME:          ${{ vars.WEB_APP_NAME }}
  MIGRATOR_JOB_NAME:     ${{ vars.MIGRATOR_JOB_NAME }}
  PUBLIC_FQDN:           ${{ vars.PUBLIC_FQDN }}
  IMAGE_TAG:             ${{ github.sha }}
  # Override to '["self-hosted","linux","stocky"]' (JSON array as a single string)
  # via repo Variable RUNS_ON_DEPLOY once the in-VNet runner is online. Defaults
  # to GitHub-hosted, which only works while ACR public access is permitted.

jobs:
  build-and-deploy:
    runs-on: ${{ fromJSON(vars.RUNS_ON_DEPLOY || '"ubuntu-latest"') }}
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login (admin credentials)
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login "$ACR_LOGIN_SERVER" -u "$ACR_NAME" --password-stdin

      - name: Build + push runner image
        run: |
          docker build -f src/runner/Dockerfile -t "$ACR_LOGIN_SERVER/stocky-gh-runner:latest" .
          docker push "$ACR_LOGIN_SERVER/stocky-gh-runner:latest"

      - name: Build + push api image
        run: |
          docker build -f src/Api/Dockerfile -t "$ACR_LOGIN_SERVER/stocky-api:$IMAGE_TAG" .
          docker push "$ACR_LOGIN_SERVER/stocky-api:$IMAGE_TAG"

      - name: Build + push web image
        run: |
          docker build -f src/Web/Dockerfile -t "$ACR_LOGIN_SERVER/stocky-web:$IMAGE_TAG" .
          docker push "$ACR_LOGIN_SERVER/stocky-web:$IMAGE_TAG"

      - name: Run migrator job and wait
        run: |
          set -euo pipefail
          # Resolve the managed identity attached to the migrator job (for ACR pull).
          MIGRATOR_MI=$(az containerapp job show \
            --name "$MIGRATOR_JOB_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "identity.userAssignedIdentities | keys(@) | [0]" -o tsv)
          # Configure ACR pull via managed identity (idempotent; needed on first real deploy).
          az containerapp job registry set \
            --name "$MIGRATOR_JOB_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server "$ACR_LOGIN_SERVER" \
            --identity "$MIGRATOR_MI"
          # Update the job template: new image, args, SQL token secret + env var.
          # --set-env-vars MERGES with existing vars (AZURE_CLIENT_ID, ConnectionStrings__Sql, ...).
          # Do NOT use `az containerapp job start --env-vars` — that replaces the entire env block.
          #
          # SQL token: pre-fetched from the CI OIDC identity so the migrator container
          # skips the ACA IMDS proxy (unreliable for this UAMI).
          # One-time prerequisite — run as SQL Entra admin:
          #   CREATE USER [id-stocky-prod-cicd] FROM EXTERNAL PROVIDER;
          #   ALTER ROLE db_owner ADD MEMBER [id-stocky-prod-cicd];
          SQL_TOKEN=$(az account get-access-token \
            --resource https://database.windows.net/ \
            --query accessToken -o tsv)
          az containerapp job update \
            --name "$MIGRATOR_JOB_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/stocky-api:$IMAGE_TAG" \
            --args='--migrate-only' \
            --set-env-vars "PRE_FETCHED_SQL_TOKEN=$SQL_TOKEN"
          EXEC_NAME=$(az containerapp job start \
            --name "$MIGRATOR_JOB_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query name -o tsv)
          echo "Started job execution: $EXEC_NAME"
          # Poll for completion (max ~30 min).
          for i in $(seq 1 60); do
            STATUS=$(az containerapp job execution show \
              --name "$MIGRATOR_JOB_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --job-execution-name "$EXEC_NAME" \
              --query properties.status -o tsv)
            echo "[$i] migrator status: $STATUS"
            case "$STATUS" in
              Succeeded) exit 0 ;;
              Failed|Degraded|Stopped) echo "Migrator failed"; exit 1 ;;
            esac
            sleep 30
          done
          echo "Timed out waiting for migrator"; exit 1

      - name: Update api container app
        run: |
          API_MI=$(az containerapp show \
            --name "$API_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "identity.userAssignedIdentities | keys(@) | [0]" -o tsv)
          az containerapp registry set \
            --name "$API_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server "$ACR_LOGIN_SERVER" \
            --identity "$API_MI"
          az containerapp update \
            --name "$API_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/stocky-api:$IMAGE_TAG" \
            --set-env-vars "AllowedOrigins__0=https://${PUBLIC_FQDN}"
          az containerapp ingress update \
            --name "$API_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --target-port 8080

      - name: Update web container app
        run: |
          WEB_MI=$(az containerapp show \
            --name "$WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "identity.userAssignedIdentities | keys(@) | [0]" -o tsv)
          az containerapp registry set \
            --name "$WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server "$ACR_LOGIN_SERVER" \
            --identity "$WEB_MI"
          az containerapp update \
            --name "$WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/stocky-web:$IMAGE_TAG"
          az containerapp ingress update \
            --name "$WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --target-port 8080

      - name: Smoke test /health
        run: |
          for i in $(seq 1 12); do
            BODY=$(curl -kLs "https://${PUBLIC_FQDN}/health" || true)
            echo "health response: $BODY"
            echo "$BODY" | grep -q '"status"' && exit 0
            sleep 10
          done
          echo "Smoke test failed"; exit 1
