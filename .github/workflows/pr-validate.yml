name: pr-validate

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bicep
        run: az bicep install
      - name: Build Bicep
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore Stocky.slnx
      - run: dotnet build Stocky.slnx --no-restore -c Release
      - run: dotnet test Stocky.slnx --no-build -c Release --logger "trx;LogFileName=test.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
          retention-days: 7
